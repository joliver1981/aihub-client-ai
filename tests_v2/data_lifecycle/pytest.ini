[pytest]
# Local pytest config for the data-lifecycle CRUD suite. Stops pytest
# from walking up to tests_v2/pytest.ini (which has strict-markers and
# limits testpaths). Run with:
#   C:/Users/james/miniconda3/envs/aihub2.1/python.exe -m pytest \
#       tests_v2/data_lifecycle/ -v --tb=short
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short

markers =
    crud: CRUD round-trip lifecycle test
    lifecycle: Multi-step lifecycle test (create -> read -> ... -> delete)
    live: Requires running services
