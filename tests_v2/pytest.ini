[pytest]
testpaths = tests_v2/unit tests_v2/api tests_v2/integration tests_v2/security tests_v2/migrations
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers

markers =
    unit: Pure unit tests, no external deps
    api: Flask/FastAPI test client tests (no live server)
    integration: Multi-module tests
    security: Authorization, isolation, injection
    migration: SQL migration tests
    slow: Long-running tests
    live: Requires running services (skipped by default)
    smoke: Quick sanity check

asyncio_mode = auto
