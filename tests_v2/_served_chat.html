    <!-- Initialize preferences -->
    <script>
        // Initialize user preferences when the DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            // Check if UserPreferences module exists
            if (typeof UserPreferences !== 'undefined') {
                // Initialize preferences
                UserPreferences.init()
                    .then(() => {
                        console.log('User preferences initialized successfully');
                        // You can trigger any UI updates based on preferences here
                    })
                    .catch(error => {
                        console.error('Error initializing preferences:', error);
                    });
            } else {
                console.warn('UserPreferences module not found. Make sure preferences.js is included.');
            }


            // Check if UserPreferences is available (will be after preferences.js loads)
            if (typeof UserPreferences !== 'undefined') {
            // Apply theme on initial page load
            UserPreferences.loadPreferences().then(() => {
                const theme = UserPreferences.getPreference('theme', 'light');
                applyTheme(theme);
                
                // Set up listener for theme changes
                UserPreferences.onPreferenceChange('theme', applyTheme);
            });
            }
            
            function applyTheme(theme) {
            const body = document.body;
            // Remove existing theme classes
            body.classList.remove('theme-light', 'theme-dark', 'theme-auto');

            // Add the new theme class
            body.classList.add(`theme-${theme}`);

            // --- Drive the newer .doc-page wrappers from the global pref ---
            //   theme === 'light'  -> force light-mode on every .doc-page
            //   theme === 'dark'   -> force dark   (no light-mode class)
            //   anything else      -> "default" behavior: honor each page's
            //                         per-page toggle (localStorage.docPageTheme)
            // This makes the legacy UI Theme preference actually affect the
            // dark-first pages introduced by the recent look-and-feel refresh.
            const forced = (theme === 'light' || theme === 'dark');
            let effectiveIsLight;
            if (theme === 'light') {
                effectiveIsLight = true;
            } else if (theme === 'dark') {
                effectiveIsLight = false;
            } else {
                // Honor the per-page button's choice when pref is default/auto
                effectiveIsLight = (localStorage.getItem('docPageTheme') === 'light');
            }

            document.querySelectorAll('.doc-page').forEach(dp => {
                dp.classList.toggle('light-mode', effectiveIsLight);
            });

            // Keep any visible per-page toggle button's icon/label in sync
            const docThemeIcon = document.getElementById('docThemeIcon');
            const docThemeLabel = document.getElementById('docThemeLabel');
            if (docThemeIcon) docThemeIcon.className = effectiveIsLight ? 'fas fa-sun' : 'fas fa-moon';
            if (docThemeLabel) docThemeLabel.textContent = effectiveIsLight ? 'Light' : 'Dark';

            // Hide the per-page toggle buttons when the global pref forces a
            // theme — the button would otherwise be misleading (click it and
            // the next page load snaps back to the forced value).
            body.classList.toggle('theme-forced', forced);

            // If using system theme, check system preference
            if (theme === 'auto') {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                body.classList.add('theme-dark');
                body.classList.remove('theme-light');
                } else {
                body.classList.add('theme-light');
                body.classList.remove('theme-dark');
                }

                // Listen for system theme changes
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                if (UserPreferences.getPreference('theme', 'light') === 'auto') {
                    body.classList.toggle('theme-dark', e.matches);
                    body.classList.toggle('theme-light', !e.matches);
                }
                });
            }

            // Store theme in localStorage for fast initial loading
            //localStorage.setItem('theme', theme);
            }


        });
    </script>

    <script>
    // Close tier banner and store in session
    function closeTierBanner(bannerId) {
        const banner = event.target.closest('.tier-banner');
        if (banner) {
            banner.style.display = 'none';
            
            // Store in localStorage so it doesn't show again
            localStorage.setItem(`banner_closed_${bannerId}`, 'true');
        }
    }

    // Check if banners should be shown on page load
    document.addEventListener('DOMContentLoaded', function() {
        // Check each banner
        const banners = document.querySelectorAll('.tier-banner');
        banners.forEach(banner => {
            const bannerId = banner.id || banner.className.split(' ').find(c => c.startsWith('tier-banner-'));
            if (bannerId && localStorage.getItem(`banner_closed_${bannerId}`) === 'true') {
                banner.style.display = 'none';
            }
        });
        
        // Show upgrade prompts occasionally (not every page load)
        const upgradePrompts = document.querySelectorAll('[id^="upgrade-prompt-"]');
        upgradePrompts.forEach(prompt => {
            // Show 25% of the time
            if (Math.random() < 0.25) {
                const promptId = prompt.id;
                if (localStorage.getItem(`banner_closed_${promptId}`) !== 'true') {
                    prompt.style.display = 'block';
                }
            }
        });
    });

    // Clear banner dismissals when user views tier page (they're thinking about it)
    if (window.location.pathname === '/admin/tier') {
        localStorage.removeItem('banner_closed_upgrade-workflows');
        localStorage.removeItem('banner_closed_upgrade-documents');
    }

    <script>
        // Global functions - defined at top level so they're accessible from onclick attributes
        
        // Enhanced Sidebar toggle functionality
        function toggleNewSidebar() {
            const sidebar = document.getElementById('newSidebar');
            const overlay = document.getElementById('newSidebarOverlay');
            const mainContent = document.querySelector('.new-main-content');

            if (window.innerWidth <= 768) {
                // Mobile behavior
                sidebar.classList.toggle('show');
                overlay.classList.toggle('show');
            } else {
                // Desktop behavior
                sidebar.classList.toggle('collapsed');

                // Update submenu behavior based on collapsed state
                updateSubmenuBehavior();

                // Add/remove class to body for CSS fallback
                document.body.classList.toggle('sidebar-collapsed', sidebar.classList.contains('collapsed'));

                // Directly adjust main content margin
                if (sidebar.classList.contains('collapsed')) {
                    mainContent.style.marginLeft = 'var(--sidebar-collapsed-width)';
                } else {
                    mainContent.style.marginLeft = 'var(--sidebar-width)';
                }

                // Update toggle icon
                const toggleIcon = sidebar.querySelector('.new-sidebar-toggle i');
                if (sidebar.classList.contains('collapsed')) {
                    toggleIcon.className = 'fas fa-chevron-right';
                } else {
                    toggleIcon.className = 'fas fa-chevron-left';
                }

                // Save state in localStorage
                localStorage.setItem('newSidebarCollapsed', sidebar.classList.contains('collapsed'));
            }
        }

        // Update submenu behavior based on sidebar state
        function updateSubmenuBehavior() {
            const sidebar = document.getElementById('newSidebar');
            const isCollapsed = sidebar.classList.contains('collapsed');
            
            // When toggling, close all open submenus
            if (typeof $ !== 'undefined' && typeof jQuery !== 'undefined') {
                $('.new-nav-submenu').removeClass('show');
                $('.new-nav-dropdown').attr('aria-expanded', 'false');
            }
        }

        // Initialize Enhanced Navigation
        $(document).ready(function() {
            // Restore sidebar state
            const sidebarCollapsed = localStorage.getItem('newSidebarCollapsed') === 'true';
            const sidebar = document.getElementById('newSidebar');
            const mainContent = document.querySelector('.new-main-content');

            if (sidebarCollapsed && window.innerWidth > 768) {
                sidebar.classList.add('collapsed');
                document.querySelector('.new-sidebar-toggle i').className = 'fas fa-chevron-right';
                document.body.classList.add('sidebar-collapsed');
                mainContent.style.marginLeft = 'var(--sidebar-collapsed-width)';
                updateSubmenuBehavior();
            }

            // Handle submenu toggles
            $(document).on('click', 'a.new-nav-dropdown, .new-nav-dropdown', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                const targetId = $(this).data('target');
                const target = $(targetId);
                
                if (!target.length) {
                    console.error('Submenu not found:', targetId);
                    return false;
                }
                
                const isVisible = target.hasClass('show');

                // Close other open submenus
                $('.new-nav-submenu.show').not(target).removeClass('show').css({
                    'max-height': '',
                    'opacity': '',
                    'display': ''
                });
                $('.new-nav-dropdown[aria-expanded="true"]').not(this).attr('aria-expanded', 'false');

                // Toggle current submenu
                if (isVisible) {
                    target.removeClass('show').css({
                        'max-height': '',
                        'opacity': '',
                        'display': ''
                    });
                    $(this).attr('aria-expanded', 'false');
                } else {
                    target.addClass('show');
                    // Force visibility with inline styles as backup
                    target.css({
                        'max-height': '1000px',
                        'opacity': '1',
                        'display': 'block'
                    });
                    $(this).attr('aria-expanded', 'true');
                }
                
                return false;
            });

            // Set active navigation based on current page
            const currentPath = window.location.pathname;
            $('.new-nav-link').removeClass('active');
            
            // Find exact match first
            let activeLink = $('.new-nav-link[href="' + currentPath + '"]');

                activeLink = $('.new-nav-link').filter(function() {
                    const href = $(this).attr('href');
                    return href && currentPath.startsWith(href) && href !== '/';
                });
            }
            
            activeLink.first().addClass('active');

            // Show parent submenu if child is active
            const activeSubmenuLink = $('.new-nav-submenu .new-nav-link.active');

            if (activeSubmenuLink.length > 0 && !$(sidebar).hasClass('collapsed')) {
                const activeSubmenu = activeSubmenuLink.closest('.new-nav-submenu');
                activeSubmenu.addClass('show');
                activeSubmenu.prev('.new-nav-dropdown').attr('aria-expanded', 'true');
            }

            // Handle responsive behavior
            function handleResize() {
                const sidebar = document.getElementById('newSidebar');
                const overlay = document.getElementById('newSidebarOverlay');
                
                if (window.innerWidth > 768) {
                    sidebar.classList.remove('show');
                    overlay.classList.remove('show');
                    updateSubmenuBehavior();
                } else {
                    // Reset collapsed state on mobile
                    sidebar.classList.remove('collapsed');
                }
            }

            window.addEventListener('resize', handleResize);

            // Auto-collapse sidebar on mobile after navigation
            $('.new-nav-submenu .new-nav-link').on('click', function() {
                if (window.innerWidth <= 768) {
                    setTimeout(() => {
                        toggleNewSidebar();
                    }, 300);
                }
            });

        });
    </script>
