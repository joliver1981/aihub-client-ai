{% extends "base.html" %}

{% block title %}Application Error{% endblock %}

{% block content %}
<div class="container text-center mt-5">
    <div class="error-code display-1 font-weight-bold">ERROR</div>
    <div class="error-message h2">{{ error }}</div>
    <p class="lead">Sorry, something went wrong on our end. Please try again later.</p>
    <a href="{{ url_for('home') }}" class="btn btn-primary">Go to Homepage</a>
</div>
{% endblock %}
