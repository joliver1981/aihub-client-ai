<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub Command Center</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/command-center.css?v=9">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Leaflet.js for maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Marked.js for markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <!-- Highlight.js for code syntax highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/sql.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/xml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
    <!-- DOMPurify for safe HTML rendering -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
</head>
<body>
    <div class="cc-app">
        <!-- Left Sidebar -->
        <aside class="cc-sidebar" id="sidebar">
            <div class="cc-sidebar-header">
                <h2>Command Center</h2>
                <button class="cc-btn-icon" onclick="CC.createSession()" title="New Chat">+</button>
                <button class="cc-btn-icon cc-btn-memory" onclick="CCMemory.openManager()" title="Manage Memory">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>
            </div>

            <!-- Suggestions -->
            <div class="cc-suggestions" id="suggestions">
                <div class="cc-suggestions-header">
                    <h3>Suggestions</h3>
                    <button id="suggestions-clear-all" class="cc-clear-all" onclick="CCMemory.clearAllSuggestions()" title="Clear all suggestions" style="display:none">Clear All</button>
                </div>
                <div id="suggestion-chips"></div>
            </div>

            <!-- Session List -->
            <div class="cc-sessions">
                <div class="cc-sessions-header">
                    <h3>Sessions</h3>
                    <button class="cc-clear-all" onclick="CC.clearAllSessions()" title="Clear all sessions">Clear All</button>
                </div>
                <div id="session-list"></div>
            </div>

            <!-- Plugins (hidden until plugin integration is complete) -->
            <!-- <div class="cc-plugins">
                <h3>Plugins</h3>
                <div id="plugin-list"></div>
            </div> -->
        </aside>

        <!-- Main Chat Area -->
        <main class="cc-main">
            <div class="cc-chat-header">
                <h1 id="chat-title">New Chat</h1>
                <div class="cc-status" id="status-indicator"></div>
            </div>

            <div class="cc-messages" id="messages"></div>

            <!-- Staged files (shown above input when files are attached) -->
            <div class="cc-staged-files" id="staged-files" style="display:none"></div>

            <div class="cc-input-area">
                <button class="cc-btn-attach" id="btn-attach" title="Attach files">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>
                <textarea
                    id="user-input"
                    placeholder="Ask anything... I have access to all your agents, data, and tools."
                    rows="2"
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();CC.send()}"
                ></textarea>
                <button class="cc-btn-send" onclick="CC.send()">Send</button>
                <input type="file" id="file-input" multiple accept="*/*" style="display:none">
            </div>

            <!-- Drag & drop overlay -->
            <div class="cc-drop-overlay" id="drop-overlay" style="display:none">
                <div class="cc-drop-overlay-content">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <p>Drop files here to attach</p>
                </div>
            </div>
        </main>

        <!-- Right Panel (Task Progress + Agent Conversations) -->
        <aside class="cc-right-panel" id="right-panel" style="display:none">
            <div class="cc-right-panel-header">
                <h3>Agent Activity</h3>
                <button class="cc-panel-close" onclick="document.getElementById('right-panel').style.display='none'">✕</button>
            </div>
            <div id="task-list"></div>
            <div id="builder-log-section" style="display:none">
                <h4 class="cc-log-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">
                    🔨 Builder Agent Conversation <span class="cc-collapse-icon">▼</span>
                </h4>
                <div id="builder-log" class="cc-builder-log"></div>
            </div>
        </aside>

        <!-- Memory Manager Modal -->
        <div class="cc-modal-overlay" id="memory-modal" style="display:none" onclick="if(event.target===this)CCMemory.closeManager()">
            <div class="cc-modal">
                <div class="cc-modal-header">
                    <h3>Memory Manager</h3>
                    <button class="cc-panel-close" onclick="CCMemory.closeManager()">&#x2715;</button>
                </div>
                <div class="cc-modal-tabs">
                    <button class="cc-modal-tab active" data-tab="preferences" onclick="CCMemory.switchTab('preferences')">Preferences</button>
                    <button class="cc-modal-tab" data-tab="patterns" onclick="CCMemory.switchTab('patterns')">Learned Routes</button>
                </div>
                <div class="cc-modal-body" id="memory-modal-body"></div>
                <div class="cc-modal-footer">
                    <button class="cc-modal-clear-all" id="memory-clear-all-btn" onclick="CCMemory.clearAllCurrentTab()">Clear All</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configure highlight.js languages
        if (window.hljs) {
            ['json','python','sql','javascript','xml','bash'].forEach(lang => {
                try { hljs.registerLanguage(lang, window['hljsDefine' + lang] || (() => {})); } catch(e) {}
            });
        }
        // Configure marked.js to use highlight.js for code blocks
        if (window.marked) {
            marked.setOptions({
                highlight: function(code, lang) {
                    if (window.hljs && lang && hljs.getLanguage(lang)) {
                        try { return hljs.highlight(code, { language: lang }).value; } catch(e) {}
                    }
                    if (window.hljs) {
                        try { return hljs.highlightAuto(code).value; } catch(e) {}
                    }
                    return code;
                },
                breaks: true,
                gfm: true,
            });
        }
    </script>
    <script src="/static/js/cc-renderers.js?v=10"></script>
    <script src="/static/js/cc-memory.js?v=3"></script>
    <script src="/static/js/command-center.js?v=18"></script>
</body>
</html>
