{% extends "base.html" %}

{% block content %}
   <body>
     <main>
        <div class="px-4 py-3 my-2 text-center">
            <img class="d-block mx-auto mb-4" src="{{ url_for('static', filename='images/success-icon.svg') }}" alt="Success Logo" width="192" height="192"/>
            <!-- <img  src="/docs/5.1/assets/brand/bootstrap-logo.svg" alt="" width="72" height="57"> -->
            <h1 class="display-6 fw-bold">Custom Tool {{name}} Saved Successfully</h1>
            
            <form method="post" action="/export">
                <input hidden type="text" name="name" value="{{name}}" />
                <input hidden type="text" name="folderPath" value="{{tool_path}}" />
                <br><br>
                <button type="submit" class="btn btn-primary btn-lg px-4 gap-3">Export Tool</button>
            </form>
            <br><br>
           <a href="{{ url_for('custom') }}" class="btn btn-primary btn-lg px-4 gap-3">Back to Tool Builder</a>
          </div>
     </main>      
   </body>
{% endblock %}
