[pytest]
# Pytest configuration for AI Hub tests

# Test discovery
testpaths = tests builder_agent/tests builder_mcp/tests builder_service/tests builder_data/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Base URL for the application under test
base_url = http://10.0.0.7:5001

# Output formatting
addopts =
    -v
    --tb=short
    --strict-markers
    --ignore=tests/e2e

# Custom markers
markers =
    smoke: Quick smoke tests for basic functionality
    auth: Tests that require authentication
    slow: Tests that take longer to run
    rbac: Role-based access control tests
    unit: Pure unit tests (no external deps)
    integration: Tests requiring service interaction
    e2e: End-to-end browser tests
    ui: UI functional tests (buttons, forms, modals)
    security: Security-focused tests
    workflow: Workflow builder/execution tests
    crud: Create/read/update/delete lifecycle tests

# pytest-asyncio: auto mode allows async test functions without per-test decorator
asyncio_mode = auto

# Timeout for tests (requires pytest-timeout plugin)
# timeout = 60

# Playwright specific settings
# These can be overridden via command line: pytest --headed --slowmo=500

# Coverage (requires pytest-cov: pip install pytest-cov)
# Usage: python -m pytest tests/unit/test_X.py --cov=X --cov-report=term-missing
