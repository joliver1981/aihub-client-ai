<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Management Dashboard</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        .agent-card {
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid #007bff;
            margin-bottom: 1rem;
        }
        .agent-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .agent-status-active {
            border-left-color: #28a745;
        }
        .agent-status-inactive {
            border-left-color: #dc3545;
        }
        .agent-status-busy {
            border-left-color: #ffc107;
        }
        .task-badge {
            font-size: 0.75rem;
        }
        .quick-action-btn {
            padding: 0.25rem 0.5rem;
            font-size: 0.8rem;
        }
        .metric-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
        }
        .metric-card.success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }
        .metric-card.warning {
            background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%);
        }
        .metric-card.danger {
            background: linear-gradient(135deg, #dc3545 0%, #e83e8c 100%);
        }
        .activity-item {
            border-left: 3px solid var(--border-subtle, #e9ecef);
            padding-left: 1rem;
            margin-bottom: 1rem;
        }
        .activity-item.success {
            border-left-color: #28a745;
        }
        .activity-item.error {
            border-left-color: #dc3545;
        }
        .activity-item.warning {
            border-left-color: #ffc107;
        }
        .agent-tools-list {
            max-height: 100px;
            overflow-y: auto;
        }
        .tool-badge {
            margin: 2px;
            font-size: 0.7rem;
        }
    </style>
<link rel="stylesheet" href="/static/css/doc-pages-theme.css">
</head>
<body style="background:#000;"><div class="doc-page" id="docPage">
<div style="position:fixed;bottom:20px;right:20px;z-index:9999;"><button class="doc-theme-toggle" onclick="toggleDocTheme()" title="Toggle theme"><i class="fas fa-moon" id="docThemeIcon"></i> <span id="docThemeLabel">Dark</span></button></div>
    <div class="container-fluid py-4">
        <!-- Header -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center">
                    <h1 class="mb-0"><i class="fas fa-robot text-primary"></i> Agent Management Dashboard</h1>
                    <div class="btn-group">
                        <button class="btn btn-primary" id="refresh-dashboard">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                        <button class="btn btn-success" data-toggle="modal" data-target="#createAgentModal">
                            <i class="fas fa-plus"></i> New Agent
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Metrics Row -->
        <div class="row mb-4">
            <div class="col-lg-3 col-md-6 mb-3">
                <div class="card metric-card h-100">
                    <div class="card-body text-center">
                        <i class="fas fa-robot fa-2x mb-2"></i>
                        <h3 class="mb-1" id="total-agents">0</h3>
                        <p class="mb-0">Total Agents</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6 mb-3">
                <div class="card metric-card success h-100">
                    <div class="card-body text-center">
                        <i class="fas fa-check-circle fa-2x mb-2"></i>
                        <h3 class="mb-1" id="active-agents">0</h3>
                        <p class="mb-0">Active Agents</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6 mb-3">
                <div class="card metric-card warning h-100">
                    <div class="card-body text-center">
                        <i class="fas fa-tasks fa-2x mb-2"></i>
                        <h3 class="mb-1" id="active-tasks">0</h3>
                        <p class="mb-0">Active Tasks</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6 mb-3">
                <div class="card metric-card danger h-100">
                    <div class="card-body text-center">
                        <i class="fas fa-exclamation-triangle fa-2x mb-2"></i>
                        <h3 class="mb-1" id="failed-tasks">0</h3>
                        <p class="mb-0">Failed Tasks</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="row">
            <!-- Agents List -->
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="fas fa-list"></i> Active Agents</h5>
                        <div class="form-group mb-0">
                            <select class="form-control form-control-sm" id="agent-filter">
                                <option value="all">All Agents</option>
                                <option value="active">Active Only</option>
                                <option value="inactive">Inactive Only</option>
                                <option value="busy">Busy Only</option>
                            </select>
                        </div>
                    </div>
                    <div class="card-body" style="max-height: 600px; overflow-y: auto;">
                        <div id="agents-list">
                            <!-- Agents will be loaded here -->
                            <div class="text-center py-4">
                                <i class="fas fa-spinner fa-spin fa-2x text-muted"></i>
                                <p class="text-muted mt-2">Loading agents...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Activity Feed -->
            <div class="col-lg-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="fas fa-history"></i> Recent Activity</h5>
                    </div>
                    <div class="card-body" style="max-height: 600px; overflow-y: auto;">
                        <div id="activity-feed">
                            <!-- Activity will be loaded here -->
                            <div class="text-center py-4">
                                <i class="fas fa-spinner fa-spin fa-2x text-muted"></i>
                                <p class="text-muted mt-2">Loading activity...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Task Management Section -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="fas fa-tasks"></i> Task Management</h5>
                        <button class="btn btn-sm btn-primary" data-toggle="modal" data-target="#taskModal">
                            <i class="fas fa-plus"></i> Create Task
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped" id="tasks-table">
                                <thead>
                                    <tr>
                                        <th>Task ID</th>
                                        <th>Agent</th>
                                        <th>Description</th>
                                        <th>Status</th>
                                        <th>Created</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="tasks-tbody">
                                    <!-- Tasks will be loaded here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Agent Modal -->
    <div class="modal fade" id="createAgentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create New Agent</h5>
                    <button type="button" class="close" data-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="create-agent-form">
                        <div class="form-group">
                            <label>Agent Name</label>
                            <input type="text" class="form-control" id="agent-name" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea class="form-control" id="agent-description" rows="3" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Agent Type</label>
                            <select class="form-control" id="agent-type">
                                <option value="general">General Agent</option>
                                <option value="data">Data Agent</option>
                                <option value="workflow">Workflow Agent</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="save-agent">Create Agent</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Task Modal -->
    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create Task</h5>
                    <button type="button" class="close" data-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="create-task-form">
                        <div class="form-group">
                            <label>Select Agent</label>
                            <select class="form-control" id="task-agent" required>
                                <option value="">Select an agent...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Task Description</label>
                            <textarea class="form-control" id="task-description" rows="3" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Priority</label>
                            <select class="form-control" id="task-priority">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                                <option value="urgent">Urgent</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="save-task">Create Task</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        class AgentDashboard {
            constructor() {
                this.agents = [];
                this.tasks = [];
                this.init();
            }

            init() {
                this.loadAgents();
                this.loadTasks();
                this.loadActivity();
                this.bindEvents();
                
                // Auto-refresh every 30 seconds
                setInterval(() => {
                    this.refreshDashboard();
                }, 30000);
            }

            bindEvents() {
                $('#refresh-dashboard').click(() => this.refreshDashboard());
                $('#agent-filter').change(() => this.filterAgents());
                $('#save-agent').click(() => this.createAgent());
                $('#save-task').click(() => this.createTask());
            }

            async loadAgents() {
                try {
                    const response = await fetch('/get/agents');
                    const data = await response.json();
                    
                    console.log('Full agent response:', data); // Debug log
                    
                    if (data.status === 'success') {
                        this.agents = data.data;
                        
                        // Debug: Log agent structure
                        if (this.agents.length > 0) {
                            console.log('First agent structure:', this.agents[0]);
                            console.log('Agent properties:', Object.keys(this.agents[0]));
                        }
                        
                        this.updateMetrics();
                        this.renderAgents();
                        this.updateTaskAgentOptions();
                    } else {
                        console.error('Error loading agents:', data.message);
                    }
                } catch (error) {
                    console.error('Error loading agents:', error);
                }
            }

            async loadTasks() {
                try {
                    // Assuming you have a tasks endpoint
                    const response = await fetch('/api/agent/communications/history');
                    const data = await response.json();
                    
                    if (data.status === 'success') {
                        this.tasks = data.data || [];
                        this.renderTasks();
                    }
                } catch (error) {
                    console.error('Error loading tasks:', error);
                }
            }

            async loadActivity() {
                try {
                    const response = await fetch('/api/agent/communications/history?limit=10');
                    const data = await response.json();
                    
                    if (data.status === 'success') {
                        this.renderActivity(data.data || []);
                    }
                } catch (error) {
                    console.error('Error loading activity:', error);
                }
            }

            updateMetrics() {
                const totalAgents = this.agents.length;
                const activeAgents = this.agents.filter(a => a.agent_enabled).length;
                const activeTasks = this.tasks.filter(t => t.status === 'running').length;
                const failedTasks = this.tasks.filter(t => t.status === 'error').length;

                $('#total-agents').text(totalAgents);
                $('#active-agents').text(activeAgents);
                $('#active-tasks').text(activeTasks);
                $('#failed-tasks').text(failedTasks);
            }

            renderAgents() {
                const container = $('#agents-list');
                const filter = $('#agent-filter').val();
                
                let filteredAgents = this.agents;
                if (filter === 'active') {
                    filteredAgents = this.agents.filter(a => a.agent_enabled);
                } else if (filter === 'inactive') {
                    filteredAgents = this.agents.filter(a => !a.agent_enabled);
                }

                if (filteredAgents.length === 0) {
                    container.html('<p class="text-muted text-center py-4">No agents found</p>');
                    return;
                }

                const html = filteredAgents.map(agent => this.renderAgentCard(agent)).join('');
                container.html(html);
            }

            renderAgentCard(agent) {
                const statusClass = agent.agent_enabled ? 'agent-status-active' : 'agent-status-inactive';
                const statusIcon = agent.agent_enabled ? 'fas fa-check-circle text-success' : 'fas fa-times-circle text-danger';
                const statusText = agent.agent_enabled ? 'Active' : 'Inactive';
                
                // Use the correct property names from your actual data structure
                const agentName = agent.agent_description || `Agent ${agent.agent_id}`;
                const agentObjective = agent.agent_objective || 'No objective specified';
                
                // Tools are already included in the response as tool_names array
                const tools = agent.tool_names || [];
                const toolsBadges = tools.slice(0, 5).map(tool => 
                    `<span class="badge badge-secondary tool-badge">${tool}</span>`
                ).join('');
                const moreTools = tools.length > 5 ? `<span class="badge badge-light tool-badge">+${tools.length - 5} more</span>` : '';

                return `
                    <div class="agent-card card ${statusClass}">
                        <div class="card-body">
                            <div class="row align-items-center">
                                <div class="col-md-8">
                                    <div class="d-flex align-items-center mb-2">
                                        <i class="${statusIcon} mr-2"></i>
                                        <h6 class="mb-0 font-weight-bold">${agentName}</h6>
                                        <span class="badge badge-${agent.agent_enabled ? 'success' : 'secondary'} ml-2">${statusText}</span>
                                    </div>
                                    <p class="text-muted small mb-2">${agentObjective}</p>
                                    <div class="agent-tools-list">
                                        ${tools.length > 0 ? toolsBadges + moreTools : '<span class="text-muted small">No tools assigned</span>'}
                                    </div>
                                </div>
                                <div class="col-md-4 text-right">
                                    <div class="btn-group btn-group-sm">
                                        <button class="btn btn-outline-primary quick-action-btn" onclick="dashboard.chatWithAgent(${agent.agent_id})">
                                            <i class="fas fa-comments"></i> Chat
                                        </button>
                                        <button class="btn btn-outline-info quick-action-btn" onclick="dashboard.viewAgentDetails(${agent.agent_id})">
                                            <i class="fas fa-eye"></i> Details
                                        </button>
                                        <button class="btn btn-outline-${agent.agent_enabled ? 'warning' : 'success'} quick-action-btn" onclick="dashboard.toggleAgent(${agent.agent_id})">
                                            <i class="fas fa-power-off"></i> ${agent.agent_enabled ? 'Stop' : 'Start'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderActivity(activities) {
                const container = $('#activity-feed');
                
                if (activities.length === 0) {
                    container.html('<p class="text-muted text-center py-4">No recent activity</p>');
                    return;
                }

                const html = activities.map(activity => {
                    const statusClass = activity.status === 'success' ? 'success' : 
                                       activity.status === 'error' ? 'error' : 'warning';
                    const icon = activity.status === 'success' ? 'fas fa-check-circle' : 
                                activity.status === 'error' ? 'fas fa-times-circle' : 'fas fa-clock';
                    
                    return `
                        <div class="activity-item ${statusClass}">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <i class="${icon} mr-2"></i>
                                    <strong>${activity.from_agent_name}</strong> → ${activity.to_agent_name}
                                </div>
                                <small class="text-muted">${new Date(activity.created_date).toLocaleTimeString()}</small>
                            </div>
                            <p class="small text-muted mt-1 mb-0">${activity.message.substring(0, 100)}${activity.message.length > 100 ? '...' : ''}</p>
                        </div>
                    `;
                }).join('');

                container.html(html);
            }

            renderTasks() {
                const tbody = $('#tasks-tbody');
                
                if (this.tasks.length === 0) {
                    tbody.html('<tr><td colspan="6" class="text-center text-muted py-4">No tasks found</td></tr>');
                    return;
                }

                const html = this.tasks.map(task => {
                    const statusBadge = task.status === 'success' ? 'badge-success' : 
                                       task.status === 'error' ? 'badge-danger' : 'badge-warning';
                    
                    return `
                        <tr>
                            <td>${task.request_id.substring(0, 8)}...</td>
                            <td>${task.from_agent_name}</td>
                            <td>${task.message.substring(0, 50)}${task.message.length > 50 ? '...' : ''}</td>
                            <td><span class="badge ${statusBadge}">${task.status}</span></td>
                            <td>${new Date(task.created_date).toLocaleDateString()}</td>
                            <td>
                                <button class="btn btn-sm btn-outline-info" onclick="dashboard.viewTaskDetails('${task.request_id}')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');

                tbody.html(html);
            }

            updateTaskAgentOptions() {
                const select = $('#task-agent');
                select.html('<option value="">Select an agent...</option>');
                
                this.agents.filter(a => a.agent_enabled).forEach(agent => {
                    const agentName = agent.agent_description || `Agent ${agent.agent_id}`;
                    select.append(`<option value="${agent.agent_id}">${agentName}</option>`);
                });
            }

            filterAgents() {
                this.renderAgents();
            }

            async createAgent() {
                const name = $('#agent-name').val();
                const description = $('#agent-description').val();
                const type = $('#agent-type').val();

                if (!name || !description) {
                    alert('Please fill in all required fields');
                    return;
                }

                try {
                    const response = await fetch('/add/data_agent', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            agent_id: 0,
                            agent_description: name,
                            agent_objective: description,
                            agent_enabled: true,
                            connection_id: 1 // Default connection
                        })
                    });

                    const data = await response.json();
                    if (data.status === 'success') {
                        $('#createAgentModal').modal('hide');
                        $('#create-agent-form')[0].reset();
                        this.refreshDashboard();
                    } else {
                        alert('Error creating agent: ' + data.message);
                    }
                } catch (error) {
                    alert('Error creating agent: ' + error.message);
                }
            }

            async createTask() {
                const agentId = $('#task-agent').val();
                const description = $('#task-description').val();
                const priority = $('#task-priority').val();

                if (!agentId || !description) {
                    alert('Please fill in all required fields');
                    return;
                }

                // This would integrate with your task creation system
                // For now, we'll use the agent communication system
                try {
                    const response = await fetch('/api/agent/communicate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            from_agent_id: 1, // System agent
                            to_agent_id: parseInt(agentId),
                            message: description,
                            context: { priority: priority }
                        })
                    });

                    if (response.ok) {
                        $('#taskModal').modal('hide');
                        $('#create-task-form')[0].reset();
                        this.refreshDashboard();
                    }
                } catch (error) {
                    alert('Error creating task: ' + error.message);
                }
            }

            async toggleAgent(agentId) {
                const agent = this.agents.find(a => a.agent_id === agentId);
                if (!agent) return;

                try {
                    const response = await fetch('/add/data_agent', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            agent_id: agent.agent_id,
                            agent_description: agent.agent_description,
                            agent_objective: agent.agent_objective,
                            agent_enabled: !agent.agent_enabled,
                            connection_id: agent.connection_id || 1
                        })
                    });

                    if (response.ok) {
                        this.refreshDashboard();
                    }
                } catch (error) {
                    alert('Error toggling agent: ' + error.message);
                }
            }

            chatWithAgent(agentId) {
                // Redirect to your existing chat interface
                window.open(`/assistants?agent=${agentId}`, '_blank');
            }

            viewAgentDetails(agentId) {
                // Redirect to your existing agent details page
                window.open(`/custom_agent_enhanced?agent=${agentId}`, '_blank');
            }

            viewTaskDetails(taskId) {
                alert(`Task details for ${taskId} - This would open a detailed view`);
            }

            refreshDashboard() {
                this.loadAgents();
                this.loadTasks();
                this.loadActivity();
            }
        }

        // Initialize dashboard when page loads
        let dashboard;
        $(document).ready(() => {
            dashboard = new AgentDashboard();
        });
    </script>
<script>
function toggleDocTheme(){var p=document.getElementById('docPage'),i=document.getElementById('docThemeIcon'),l=document.getElementById('docThemeLabel');p.classList.toggle('light-mode');var lt=p.classList.contains('light-mode');i.className=lt?'fas fa-sun':'fas fa-moon';l.textContent=lt?'Light':'Dark';localStorage.setItem('docPageTheme',lt?'light':'dark')}
(function(){var s=localStorage.getItem('docPageTheme');if(s==='light'){var p=document.getElementById('docPage');if(p){p.classList.add('light-mode');var i=document.getElementById('docThemeIcon'),l=document.getElementById('docThemeLabel');if(i)i.className='fas fa-sun';if(l)l.textContent='Light'}}})();
</script>
</div><!-- /.doc-page -->
</body>
</html>
